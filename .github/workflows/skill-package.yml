name: skill-package

on:
  pull_request:
    paths:
      - "SKILL.md"
      - "src/**"
      - "references/**"
      - "contracts/**"
      - "tests/**"
      - "detector/**"
      - "README.md"
      - "AGENTS.md"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/skill-package.yml"
  push:
    branches: [main]
    paths:
      - "SKILL.md"
      - "src/**"
      - "references/**"
      - "contracts/**"
      - "tests/**"
      - "detector/**"
      - "README.md"
      - "AGENTS.md"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/skill-package.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate contract JSON
        run: |
          python3 -m json.tool contracts/public-contract.json > /dev/null
          python3 -m json.tool contracts/surface-categories.json > /dev/null

      - name: Check surface-category inventory
        run: bash scripts/check-pattern-count.sh

      - name: Regenerate Cursor skill
        run: npm run build

      - name: Run full validation
        run: npm test

      - name: Test deployment and rollback transaction
        run: npm run test:deploy

      - name: Fail if generated skill drifted
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated SKILL.md is out of sync."
            echo "Run 'npm run build' and commit the result."
            git status --short
            exit 1
          fi
          echo "generated SKILL.md is in sync"
