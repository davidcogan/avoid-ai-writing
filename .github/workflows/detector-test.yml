name: detector

on:
  push:
    paths:
      - "detector/**"
      - "package.json"
      - ".github/workflows/detector-test.yml"
  pull_request:
    paths:
      - "detector/**"
      - "package.json"
      - ".github/workflows/detector-test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm test
